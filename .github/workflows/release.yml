name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ═══ macOS 构建 ═══
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CLI tools
        run: |
          brew install pngquant oxipng mozjpeg gifsicle webp jpeg-xl libavif

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build
        run: cargo tauri build
        env:
          CODE_SIGN_IDENTITY: ""

      - name: Bundle CLI tools
        run: bash scripts/package.sh

      - name: Create DMG
        run: |
          hdiutil create -volname "OctoShrink" \
            -srcfolder "src-tauri/target/release/bundle/macos/OctoShrink.app" \
            -ov -format UDZO \
            "src-tauri/target/release/bundle/OctoShrink_${{ github.ref_name }}_macos.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/release/bundle/*.dmg

  # ═══ Windows 构建 ═══
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download CLI tools
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          New-Item -ItemType Directory -Force -Path src-tauri\resources\bin | Out-Null
          Remove-Item src-tauri\resources\bin\* -Force -ErrorAction SilentlyContinue

          function Download-Tool($name, $url, $pattern) {
            try {
              $zip = "$name.zip"
              Write-Host "Downloading $name from $url"
              Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
              $dest = "extract-$name"
              Expand-Archive $zip -DestinationPath $dest -Force
              $found = Get-ChildItem -Path $dest -Filter $pattern -Recurse | Select-Object -First 1
              if ($found) {
                Copy-Item $found.FullName "src-tauri\resources\bin\$name" -Force
                Write-Host "  OK $name"
              } else {
                Write-Host "  SKIP $name - binary not found in archive"
              }
              Remove-Item $dest -Recurse -Force -ErrorAction SilentlyContinue
              Remove-Item $zip -Force -ErrorAction SilentlyContinue
            } catch {
              Write-Host "  SKIP $name - $($_.Exception.Message)"
            }
          }

          Download-Tool "pngquant.exe" "https://pngquant.org/pngquant-windows.zip" "pngquant.exe"
          Download-Tool "oxipng.exe" "https://github.com/shssoichiro/oxipng/releases/download/v9.1.5/oxipng-9.1.5-x86_64-pc-windows-msvc.zip" "oxipng.exe"
          Download-Tool "gifsicle.exe" "https://eternallybored.org/misc/gifsicle/releases/1.95/windows-x64/gifsicle-x64.zip" "gifsicle.exe"
          Download-Tool "cwebp.exe" "https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-1.4.0-windows-x64.zip" "cwebp.exe"
          Download-Tool "avifenc.exe" "https://github.com/AOM-AV1/libavif/releases/download/v1.1.1/libavif-win64-v1.1.1.zip" "avifenc.exe"
          Download-Tool "cjxl.exe" "https://github.com/libjxl/libjxl/releases/download/v0.10.2/jxl-x64-windows-0.10.2.zip" "cjxl.exe"
          Download-Tool "cjpeg.exe" "https://github.com/libjpeg-turbo/libjpeg-turbo/releases/download/3.0.2/libjpeg-turbo-3.0.2-vc64.exe" "cjpeg.exe"

          # cjpeg from libjpeg-turbo installer might be an EXE installer, try alternative
          if (-not (Test-Path "src-tauri\resources\bin\cjpeg.exe")) {
            Download-Tool "cjpeg.exe" "https://github.com/Mozreble/mozjpeg/releases/download/v4.1.1/mozjpeg-4.1.1-win64.zip" "cjpeg.exe"
          }

          Write-Host "`nBundled tools:"
          Get-ChildItem src-tauri\resources\bin\ -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Add resources config and build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $config = Get-Content src-tauri\tauri.conf.json -Raw | ConvertFrom-Json
          if ($config.bundle.PSObject.Properties.Name -contains 'resources') {
            $config.bundle.resources = @("resources/bin/*")
          } else {
            $config.bundle | Add-Member -NotePropertyName "resources" -NoteValue @("resources/bin/*")
          }
          $config | ConvertTo-Json -Depth 10 | Set-Content src-tauri\tauri.conf.json

          cargo install tauri-cli --version "^2.0" --locked
          cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  # ═══ Linux 构建 ═══
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            file

      - name: Download CLI tools
        run: |
          set +e
          rm -f src-tauri/resources/bin/*
          rm -rf src-tauri/resources/lib/

          # Install via apt
          sudo apt-get install -y pngquant gifsicle webp libavif-bin libjpeg-turbo-progs || true
          for tool in pngquant gifsicle cwebp avifenc cjpeg; do
            p=$(which $tool 2>/dev/null)
            if [ -n "$p" ] && [ -f "$p" ]; then
              cp "$p" src-tauri/resources/bin/ && echo "  OK $tool" || echo "  SKIP $tool"
            else
              echo "  SKIP $tool (not found)"
            fi
          done

          # oxipng
          wget -q "https://github.com/shssoichiro/oxipng/releases/download/v9.1.5/oxipng-9.1.5-x86_64-unknown-linux-musl.tar.gz" -O /tmp/oxipng.tar.gz && \
            tar xzf /tmp/oxipng.tar.gz -C /tmp && \
            cp /tmp/oxipng-*/oxipng src-tauri/resources/bin/ && echo "  OK oxipng" || echo "  SKIP oxipng"

          # cjxl
          wget -q "https://github.com/libjxl/libjxl/releases/download/v0.10.2/jxl-linux-x64-static-v0.10.2.tar.gz" -O /tmp/jxl.tar.gz && \
            mkdir -p /tmp/jxl-extract && \
            tar xzf /tmp/jxl.tar.gz -C /tmp/jxl-extract 2>/dev/null && \
            find /tmp/jxl-extract -name cjxl -type f -executable -exec cp {} src-tauri/resources/bin/ \; 2>/dev/null && \
            echo "  OK cjxl" || echo "  SKIP cjxl"

          echo ""
          echo "Bundled tools:"
          ls -la src-tauri/resources/bin/

      - name: Add resources config and build
        run: |
          python3 -c "
          import json
          with open('src-tauri/tauri.conf.json', 'r') as f:
              d = json.load(f)
          d['bundle']['resources'] = ['resources/bin/*']
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(d, f, indent=2, ensure_ascii=False)
              f.write('\n')
          "

          cargo install tauri-cli --version "^2.0" --locked
          cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  # ═══ 发布 Release ═══
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name "*.dmg" -exec cp {} release/ \;
          find artifacts -name "*.exe" -exec cp {} release/ \;
          find artifacts -name "*.msi" -exec cp {} release/ \;
          find artifacts -name "*.deb" -exec cp {} release/ \;
          find artifacts -name "*.AppImage" -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 章小压 · OctoShrink ${{ github.ref_name }}
          body: |
            ## 章小压 · OctoShrink

            免费开源的图片压缩神器，开箱即用。

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS | `.dmg` | 内置全部压缩工具，开箱即用 |
            | Windows | `.exe` / `.msi` | 内置压缩工具，开箱即用 |
            | Linux | `.deb` / `.AppImage` | 内置压缩工具，开箱即用 |

            ### 功能
            - 支持 PNG/JPG/GIF/WebP/AVIF/JPEG XL 压缩
            - 3 线程并发批量处理
            - 暗黑模式（自动/亮色/暗黑）
            - 压缩前后实时对比
            - 一键恢复全部原图
            - 压缩失败显示错误详情
          files: release/*
          draft: false
          prerelease: false
