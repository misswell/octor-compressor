name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ═══ macOS 构建 ═══
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CLI tools
        run: |
          brew install pngquant oxipng mozjpeg gifsicle webp jpeg-xl libavif

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build
        run: cargo tauri build
        env:
          CODE_SIGN_IDENTITY: ""

      - name: Bundle CLI tools
        run: bash scripts/package.sh

      - name: Create DMG
        run: |
          hdiutil create -volname "OctoShrink" \
            -srcfolder "src-tauri/target/release/bundle/macos/OctoShrink.app" \
            -ov -format UDZO \
            "src-tauri/target/release/bundle/OctoShrink_${{ github.ref_name }}_macos.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/release/bundle/*.dmg

  # ═══ Windows 构建 ═══
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download CLI tools
        shell: pwsh
        run: |
          # Clear macOS binaries, download Windows tools
          Remove-Item src-tauri\resources\bin\* -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path src-tauri\resources\bin

          $tools = @(
            @{ Name = "pngquant.exe"; Url = "https://github.com/ImageOptim/pngquant/releases/download/v3.0.3/pngquant-3.0.3-windows.zip" },
            @{ Name = "oxipng.exe"; Url = "https://github.com/shssoichiro/oxipng/releases/download/v9.1.5/oxipng-9.1.5-x86_64-pc-windows-msvc.zip" },
            @{ Name = "gifsicle.exe"; Url = "https://eternallybored.org/misc/gifsicle/releases/current/windows-x64/giflossy-x64.zip" },
            @{ Name = "cwebp.exe"; Url = "https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-1.3.2-windows-x64.zip" },
            @{ Name = "avifenc.exe"; Url = "https://github.com/AOM-AV1/libavif/releases/download/v1.0.4/libavif-win64-v1.0.4.zip" },
            @{ Name = "cjxl.exe"; Url = "https://github.com/libjxl/libjxl/releases/download/v0.10.2/jxl-x64-windows-0.10.2.zip" }
          )

          foreach ($tool in $tools) {
            try {
              $zipPath = "$($tool.Name).zip"
              Invoke-WebRequest -Uri $tool.Url -OutFile $zipPath -ErrorAction Stop
              $extractPath = "extract-$($tool.Name)"
              Expand-Archive $zipPath -DestinationPath $extractPath -Force
              $found = Get-ChildItem -Path $extractPath -Filter $tool.Name -Recurse | Select-Object -First 1
              if ($found) {
                Copy-Item $found.FullName "src-tauri\resources\bin\$($tool.Name)" -Force
                Write-Host "  OK $($tool.Name)"
              } else {
                Write-Host "  SKIP $($tool.Name) - not found in archive"
              }
              Remove-Item $extractPath -Recurse -Force -ErrorAction SilentlyContinue
              Remove-Item $zipPath -Force -ErrorAction SilentlyContinue
            } catch {
              Write-Host "  FAIL $($tool.Name) - $($_.Exception.Message)"
            }
          }

          # cjpeg (mozjpeg) - no official Windows binary, try scoop
          try {
            iex "& {$(irm get.scoop.sh)} -RunAsAdmin" 2>$null
            scoop install png2mozjpeg 2>$null
            $cjpeg = Get-Command cjpeg.exe -ErrorAction SilentlyContinue
            if ($cjpeg) {
              Copy-Item $cjpeg.Source "src-tauri\resources\bin\cjpeg.exe" -Force
              Write-Host "  OK cjpeg.exe"
            }
          } catch {
            Write-Host "  SKIP cjpeg.exe"
          }

          Write-Host "`nBundled tools:"
          Get-ChildItem src-tauri\resources\bin\ | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Add resources config and build
        shell: pwsh
        run: |
          # Add resources config for Tauri to bundle tools
          $config = Get-Content src-tauri\tauri.conf.json -Raw | ConvertFrom-Json
          $config.bundle | Add-Member -NotePropertyName "resources" -NoteValue @("resources/bin/*") -Force
          $config | ConvertTo-Json -Depth 10 | Set-Content src-tauri\tauri.conf.json

          cargo install tauri-cli --version "^2.0" --locked
          cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  # ═══ Linux 构建 ═══
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Download CLI tools
        run: |
          # Clear macOS binaries
          rm -f src-tauri/resources/bin/*
          rm -rf src-tauri/resources/lib/

          # Install via apt and copy to resources/bin
          sudo apt-get install -y pngquant gifsicle webp libavif-bin libjpeg-turbo-progs 2>/dev/null || true
          for tool in pngquant gifsicle cwebp avifenc cjpeg; do
            cp "$(which $tool 2>/dev/null)" src-tauri/resources/bin/ 2>/dev/null && echo "  OK $tool" || echo "  SKIP $tool"
          done

          # oxipng - static musl binary
          wget -q "https://github.com/shssoichiro/oxipng/releases/download/v9.1.5/oxipng-9.1.5-x86_64-unknown-linux-musl.tar.gz" -O /tmp/oxipng.tar.gz 2>/dev/null && \
            tar xzf /tmp/oxipng.tar.gz -C /tmp && \
            cp /tmp/oxipng-*/oxipng src-tauri/resources/bin/ && echo "  OK oxipng" || echo "  SKIP oxipng"

          # cjxl - try libjxl release
          wget -q "https://github.com/libjxl/libjxl/releases/download/v0.10.2/jxl-linux-x64-static-v0.10.2.tar.gz" -O /tmp/jxl.tar.gz 2>/dev/null && \
            tar xzf /tmp/jxl.tar.gz -C /tmp 2>/dev/null && \
            find /tmp -name cjxl -type f -executable -exec cp {} src-tauri/resources/bin/ \; 2>/dev/null && echo "  OK cjxl" || echo "  SKIP cjxl"

          echo ""
          echo "Bundled tools:"
          ls -la src-tauri/resources/bin/

      - name: Add resources config and build
        run: |
          # Add resources config for Tauri to bundle tools
          python3 -c "
          import json
          with open('src-tauri/tauri.conf.json', 'r') as f:
              d = json.load(f)
          d['bundle']['resources'] = ['resources/bin/*']
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(d, f, indent=2, ensure_ascii=False)
              f.write('\n')
          "

          cargo install tauri-cli --version "^2.0" --locked
          cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  # ═══ 发布 Release ═══
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name "*.dmg" -exec cp {} release/ \;
          find artifacts -name "*.exe" -exec cp {} release/ \;
          find artifacts -name "*.msi" -exec cp {} release/ \;
          find artifacts -name "*.deb" -exec cp {} release/ \;
          find artifacts -name "*.AppImage" -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 章小压 · OctoShrink ${{ github.ref_name }}
          body: |
            ## 章小压 · OctoShrink

            免费开源的图片压缩神器，开箱即用。

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS | `.dmg` | 内置全部压缩工具，开箱即用 |
            | Windows | `.exe` / `.msi` | 内置压缩工具，开箱即用 |
            | Linux | `.deb` / `.AppImage` | 内置压缩工具，开箱即用 |

            ### 功能
            - 支持 PNG/JPG/GIF/WebP/AVIF/JPEG XL 压缩
            - 3 线程并发批量处理
            - 暗黑模式（自动/亮色/暗黑）
            - 压缩前后实时对比
            - 一键恢复全部原图
            - 压缩失败显示错误详情
          files: release/*
          draft: false
          prerelease: false
